<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Alert</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">
    <div class="screen">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="time"></span>
            <span id="battery">🔋 --%</span>
        </div>

        <!-- HOME PAGE -->
        <div class="app-content">

            <h1>Welcome 👋</h1>
            <p>Your pothole reporting dashboard</p>

            <!-- PLACEHOLDER CONTENT -->
            <button class="signup-btn">Report Pothole</button>
            <button class="signup-btn">View Map</button>

        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
