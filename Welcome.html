<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pothole Alert</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
        RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* =========================
        BODY
========================= */

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    padding:20px;

    background:
    radial-gradient(circle at center,
    #2e264a 0%,
    #1a152e 100%);
}

/* =========================
      GLASS CARD
========================= */

.welcome-card{

    width:90%;
    max-width:700px;

    padding:40px 35px;

    border-radius:28px;

    text-align:center;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    box-shadow:
    0 8px 32px rgba(121,102,255,0.25);
}

/* =========================
        TITLE
========================= */

.welcome h1{

    font-size:
    clamp(42px, 6vw, 72px);

    font-weight:700;

    line-height:1.1;

    letter-spacing:2px;

    color:white;

    text-shadow:
        0 0 10px rgba(121,102,255,0.8),
        0 0 20px rgba(121,102,255,0.8),
        0 0 40px rgba(121,102,255,1);

    animation:
    glowPulse 2s infinite alternate;
}

/* =========================
        MESSAGE
========================= */

.welcome p{

    margin-top:18px;

    font-size:16px;

    font-weight:300;

    color:rgba(255,255,255,0.75);

    letter-spacing:1px;

    line-height:1.5;
}

/* =========================
      GET STARTED BUTTON
========================= */

.get-started{

    margin-top:32px;

    display:inline-block;

    padding:14px 36px;

    border-radius:50px;

    text-decoration:none;

    font-size:17px;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
    135deg,
    #7b68ff,
    #a695ff);

    box-shadow:
        0 0 15px rgba(121,102,255,0.6),
        0 0 30px rgba(121,102,255,0.5);

    transition:0.3s ease;
}

/* BUTTON HOVER */

.get-started:hover{

    transform:scale(1.06);

    box-shadow:
        0 0 20px rgba(166,149,255,0.8),
        0 0 50px rgba(166,149,255,0.7);
}

/* =========================
        POTATO AREA
========================= */

.animation-area{

    margin-top:35px;

    position:relative;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* =========================
        POTATO
========================= */

#potato{

    width:
    clamp(110px, 20vw, 170px);

    transition:0.2s;
}

/* =========================
      GLOW ANIMATION
========================= */

@keyframes glowPulse{

    from{

        text-shadow:
            0 0 10px rgba(121,102,255,0.7),
            0 0 20px rgba(121,102,255,0.7),
            0 0 30px rgba(121,102,255,0.8);
    }

    to{

        text-shadow:
            0 0 20px rgba(166,149,255,1),
            0 0 40px rgba(166,149,255,1),
            0 0 60px rgba(166,149,255,1);
    }
}

</style>
</head>

<body>

<div class="welcome-card">

    <div class="welcome">

        <h1>Welcome to Pothole Alert</h1>

        <p>
            Report potholes quickly,
            help your community,
            and keep roads safer.
        </p>

    </div>

    <!-- ✅ LINK FIXED HERE -->
    <a href="login.html" class="get-started">
        Get Started
    </a>

    <div class="animation-area">

        <img id="potato" src="images/open.png">

        <div class="pothole"></div>

    </div>

</div>

<script>

const blinkFrames = [
    "images/open.png",
    "images/open.png",
    "images/closed.png",
    "images/open.png",
    "images/open.png"
];

const potato = document.getElementById("potato");

let blinkIndex = 0;

function blinkLoop(){

    potato.src = blinkFrames[blinkIndex];

    blinkIndex = (blinkIndex + 1) % blinkFrames.length;

    setTimeout(blinkLoop, 1400);
}

blinkLoop();

</script>

</body>
</html>
