<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Alert</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">
<div class="screen">

    <!-- STATUS BAR -->
    <div class="status-bar">
        <span id="time"></span>
        <span>🔋 85%</span>
    </div>

    <!-- SIGNUP PAGE -->
    <div id="signup" class="page active">

        <div class="app-content">

            <h2>Create Account</h2>

            <!-- PROFILE PICTURE -->
            <label class="pfp-upload">
                <input type="file" accept="image/*" id="pfpInput">
                <img id="pfpPreview" class="pfp-circle" src="" alt="">
                <p>Upload Profile Picture</p>
            </label>

            <!-- INPUTS -->
            <input type="email" placeholder="Email" class="input-box">
            <input type="tel" placeholder="Phone Number" class="input-box">
            <input type="password" placeholder="Password" class="input-box">

            <!-- BUTTON -->
            <button class="signup-btn">Sign Up</button>

            <p class="login-text">
                Already have an account?
                <a href="#" id="loginLink">Login</a>
            </p>

        </div>
    </div>
<!-- Login link -->
                    <a href="login.html">
    
                    </a>

                    <p id="message"></p>
                </div>

            </div>

        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
