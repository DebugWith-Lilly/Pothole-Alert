<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #2e264a 0%, #1a152e 100%);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        .container {
            margin-top: 5px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .right-panel {
            background: rgba(43, 37, 71, 0.6);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(121, 102, 255, 0.15);
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #a695ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #a695ff;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .input-box {
            margin: 25px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .input-box input:hover,
        .input-box input:focus {
            border-color: #a695ff;
            box-shadow: 0 0 15px rgba(166, 149, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #a695ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(166, 149, 255, 0.6);
            background: #b8aaff;
        }

        .divider {
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .switch {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        .switch span {
            color: #a695ff;
            cursor: pointer;
        }

        .switch span:hover {
            text-decoration: underline;
        }
    </style>

    <link rel="icon" href="imagesicon/lockicon.png">
</head>

<body>

    <div class="container">
        <div class="right-panel">

            <!-- ✅ BACK TO WELCOME LINK -->
            <a href="index.html" class="back-link">← Back to Welcome</a>

            <h2>Welcome back</h2>

            <p style="color: rgba(255,255,255,0.6); margin-bottom: 20px;">
                Please enter your details to sign in.
            </p>

            <div class="input-box">
                <input type="text" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa fa-eye" onclick="togglePassword()"></i>
            </div>

            <div style="text-align: left; margin-bottom: 25px; font-size: 0.9rem; color: rgba(255,255,255,0.7);">
                <input type="checkbox"> Remember me
            </div>

            <button type="button" class="btn">Login</button>

            <div class="divider">OR</div>

            <p class="switch">
                Don't have an account? <span>Register</span>
            </p>

        </div>
    </div>

    <script>
        function togglePassword() {
            let pass = document.getElementById("password");
            let icon = document.querySelector(".input-box i");

            if (pass.type === "password") {
                pass.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                pass.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>

</body>
</html>
