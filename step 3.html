<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">
    <div class="screen">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="time"></span>
            <span id="battery">🔋 --%</span>
            <script src="script.js"></script>
        </div>
        
        <!-- STEPS "NAVBAR" -->
        <div class="steps">
            <div class="step active">1<br><span>Location</span></div>
            <div class="step">2<br><span>Details</span></div>
            <div class="step">3<br><span>Confirm</span></div>
        </div>

       <!--REVIEW THE POTHOLE -->
        <div class="review-section">
            <h2>Review Your Pothole</h2>
            <p><strong>Location:</strong> 123 Eastbury Phoenix</p>
            <p><strong>Description:</strong> Large pothole, about 3 feet wide and 1 foot deep.</p>
            <img src="pothole.jpg" alt="Pothole Image" class="review-image">
            <button class="submit">Submit Report</button>
            <button class="edit">Edit Report</button>
        </div>  
        </div>
            
        </body>
</html>
