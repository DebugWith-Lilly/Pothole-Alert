<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pothole Alert</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">
    <div class="screen">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="time"></span>
            <span id="battery">🔋 --%</span>
        </div>

        <!-- LOGIN PAGE -->
        <div class="page active">

            <div class="app-content">

                <h1>Welcome Back</h1>
                <p>Login to keep your community safe</p>

                <input type="email" id="loginEmail" placeholder="name@example.com" class="input-box">
                <input type="password" id="loginPassword" placeholder="Enter your password" class="input-box">

                <button class="signup-btn" id="loginBtn">Login</button>

                <p class="login-text">
                    Don’t have an account?
                    <a href="./signup.html">Sign up</a>
                </p>

                <p id="message"></p>

            </div>

        </div>

    </div>
</div>

<script>
    // LOGIN BUTTON REDIRECT
    document.getElementById("loginBtn").addEventListener("click", function () {
        window.location.href = "verification.html";
    });
</script>
<script src="script.js"></script>

</body>
</html>
