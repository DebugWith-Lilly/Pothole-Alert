<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Alert</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
:root {
  
  --color-primary: #5319d3;
  --color-on-primary: #ffffff;
  --color-surface: #fbf8ff;
  --color-on-surface: #1a1b24;
  --color-on-surface-variant: #494455;
  --color-outline-variant: rgba(202, 195, 216, 0.5);
  --color-container-lowest: #ffffff;
  --color-container-low: #f4f2ff;

 
  --radius-xl: 16px;
  --radius-full: 9999px;
  --margin-mobile: 20px;
}


* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Manrope', sans-serif;
}

body {
  background-color: var(--color-surface);
  color: var(--color-on-surface);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}


.app-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  padding: 0 var(--margin-mobile);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: rgba(251, 248, 255, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 1000;
}

.brand-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 40px;
}

.logo-img {
  height: 40px;
  width: 40px;
  object-fit: contain;
}

.brand-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: -0.01em;
}


.main-layout {
  flex-grow: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px var(--margin-mobile) 48px var(--margin-mobile);
}

.login-card {
  width: 100%;
  max-width: 448px;
  background-color: var(--color-container-lowest);
  padding: 32px;
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-outline-variant);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

.hero-heading {
  text-align: center;
  margin-bottom: 37px;
}

.hero-heading h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--color-on-surface);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.hero-heading p {
  font-size: 14px;
  color: var(--color-on-surface-variant);
  line-height: 1.5;
}


.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-on-surface-variant);
  margin-bottom: 10px;
  align-items: center;
}

.input-wrapper {
  position: relative;
  
}

.form-input {
  width: 100%;
  padding: 16px 18px;
  font-size: 14px;
  background-color: var(--color-container-lowest);
  border: 1px solid var(--color-outline-variant);
  border-radius: 12px;
  outline: none;
  transition: all 0.2s ease;
  max-width: 300px;
  margin: 0 auto;
  display: block;
  
}

.form-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(83, 25, 211, 0.15);
}

.password-toggle-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #7a7487;
  cursor: pointer;
}


.btn-primary {
  width: 100%;
  background-color: var(--color-primary);
  color: var(--color-on-primary);
  font-size: 16px;
  font-weight: 700;
  padding: 16px;
  border: none;
  border-radius: var(--radius-full);
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(83, 25, 211, 0.2);
  transition: transform 0.1s ease, background-color 0.2s ease;
  max-width: 250px;
  margin: 0 auto;
  display: block;
}

.btn-primary:hover {
  background-color: #4310b8;
}

.btn-primary:active {
  transform: scale(0.98);
}

.skip-link-wrapper {
  text-align: center;
  margin-top: 16px;
}

.skip-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-primary);
  text-decoration: none;
}

.skip-link:hover {
  text-decoration: underline;
}
      
    </style>
</head>

<body>
    
    <div class="phone">
        <div class="screen">
              <div id="home" class="page active">

                <div class="status-bar">
                    <span id="time"></span>
                    <span>🔋 85%</span>
                </div>
                <div class="brand-wrapper">
                    <img src="logo.jpg" alt="Pothole Alert Logo" class="logo-img">
                    <span class="brand-title">Pothole Alert</span>
                </div>   
                <div class="hero-heading">
                    <h1>Welcome Back</h1>
                    <p>Login to keep your community safe and  report local road hazards</p>
                </div>
                 <form>
                    <div class="form-group">
                        <input class="form-input" id="email" placeholder="Email" type="email" required>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input class="form-input" id="password" placeholder="Password" type="password" required>
                            <button class="password-toggle-btn" type="button"></button>
                        </div>
                    </div>
                 </form>
         
<p id="message"></p>



  <a href="homepage.html">
    <button class="btn-primary" type="submit">Login →</button>
</a>
 


<script src="script.js"></script>
</body>
</html>
