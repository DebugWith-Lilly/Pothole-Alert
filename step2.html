<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Alert - Step 2</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">
    <div class="screen">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="time"></span>
            <span id="battery">🔋 --%</span>
        </div>

        <!-- STEP INDICATION -->
        <div class="steps">
            <div class="step">1<br><span>Location</span></div>
            <div class="step active">2<br><span>Details</span></div>
            <div class="step">3<br><span>Confirm</span></div>
        </div>

        <!-- UPLOAD -->
        <div class="upload-section">

            <label for="photoUpload" class="upload-btn">
                Upload Picture
            </label>

            <input 
                type="file" 
                id="photoUpload" 
                accept="image/*"
                hidden
            >

        </div>

        <!-- DETAILS INPUT -->
        <input 
            type="text" 
            id="details" 
            placeholder="Describe the pothole (optional)"
        >

        <!-- BUTTON -->
        <button class="next" id="nextBtn">Next</button>

    </div>
</div>

<script>
    document.getElementById("nextBtn").addEventListener("click", function () {
        window.location.href = "step3.html";
    });
</script>

<script src="script.js"></script>

</body>
</html>
